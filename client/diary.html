<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/css/diary.css" />
    <title>Health Diary</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="user-profile">
        <span id="welcome-text"
          >Tervetuloa, <span id="username">Käyttäjä</span>!</span
        >
      </div>

      <div class="nav-links">
        <a href="diary.html">Päiväkirja</a>
        <a href="bmi.html">BMI Laskuri</a>
      </div>

      <button id="logout-btn" class="logout-btn">Kirjaudu ulos</button>
    </nav>

    <div class="container">
      <form class="entry-form">
        <h2>Päiväkirjamerkintä</h2>

        <div class="form-group">
          <label for="entry_date">Päiväys</label>
          <input type="date" id="entry_date" required />
        </div>

        <div class="form-group">
          <label for="mood">Fiilis (1-10):</label>

          <input
            type="range"
            id="mood"
            min="1"
            max="10"
            step="1"
            list="markers"
          />

          <datalist id="markers">
            <option value="1" label="1"></option>
            <option value="2"></option>
            <option value="3"></option>
            <option value="4"></option>
            <option value="5" label="5"></option>
            <option value="6"></option>
            <option value="7"></option>
            <option value="8"></option>
            <option value="9"></option>
            <option value="10" label="10"></option>
          </datalist>
        </div>

        <div class="form-group">
          <label for="sleep_hours">Uni (tunnit)</label>
          <input type="number" id="sleep_hours" min="0" max="24" />
        </div>

        <div class="form-group">
          <label for="weight">Paino (kg)</label>
          <input type="number" id="weight" min="0" />
        </div>

        <div class="form-group">
          <label for="notes">Muistiinpanot</label>
          <textarea id="notes" rows="2" placeholder=""></textarea>
        </div>

        <button id="save-btn">Tallenna merkintä</button>
      </form>
    </div>
    <div class="entries-container">
      <h3>Omat merkinnät</h3>
      <div class="entries-list">
        <!-- Merkinnät tähän -->
      </div>
    </div>
    <script type="module" src="/src/js/diary.js"></script>
  </body>
</html>
